---
apiVersion: v1
kind: Namespace
metadata:
  name: dune-market-bot

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: market-bot-config
  namespace: dune-market-bot
data:
  # Paths inside the container — item data files are copied from the repo
  ITEM_DATA_PATH: /data/item-data.json
  CACHE_DB_PATH: /cache/market-bot-cache.db
  # !! CHANGE THIS before deploying — must match your cluster's DB service name.
  # Run this on the VM to find the correct value:
  #   sudo kubectl get svc -A | grep -i db
  # Copy the full <service-name>.<namespace>.svc.cluster.local for the DB service.
  DB_HOST: ""
  DB_PORT: "15432"
  DB_USER: ""
  DB_NAME: dune
  BUY_INTERVAL: 5m
  LIST_INTERVAL: 30m

---
apiVersion: v1
kind: Secret
metadata:
  name: market-bot-secret
  namespace: dune-market-bot
type: Opaque
stringData:
  DB_PASS: ""
  # !! SET THIS before deploying — shared secret for the HTTP API.
  API_TOKEN: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-bot
  namespace: dune-market-bot
  labels:
    app: market-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-bot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: market-bot
    spec:
      restartPolicy: Always
      containers:
        - name: market-bot
          image: alpine:3.19
          imagePullPolicy: IfNotPresent
          command: ["/app/market-bot"]
          args:
            - -dbhost=$(DB_HOST)
            - -dbport=$(DB_PORT)
            - -dbuser=$(DB_USER)
            - -dbpass=$(DB_PASS)
            - -dbname=$(DB_NAME)
            - -itemdata=$(ITEM_DATA_PATH)
            - -cachedb=$(CACHE_DB_PATH)
            - -buyinterval=$(BUY_INTERVAL)
            - -listinterval=$(LIST_INTERVAL)
            - -apiaddr=:8081
            - -apitoken=$(API_TOKEN)
          ports:
            - name: http-api
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: market-bot-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: market-bot-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: market-bot-config
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: market-bot-secret
                  key: DB_PASS
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: market-bot-secret
                  key: API_TOKEN
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: market-bot-config
                  key: DB_NAME
            - name: ITEM_DATA_PATH
              valueFrom:
                configMapKeyRef:
                  name: market-bot-config
                  key: ITEM_DATA_PATH
            - name: BUY_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: market-bot-config
                  key: BUY_INTERVAL
            - name: LIST_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: market-bot-config
                  key: LIST_INTERVAL
            - name: CACHE_DB_PATH
              valueFrom:
                configMapKeyRef:
                  name: market-bot-config
                  key: CACHE_DB_PATH
          volumeMounts:
            - name: binary
              mountPath: /app/market-bot
            - name: item-data
              mountPath: /data
            - name: cache
              mountPath: /cache
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: binary
          hostPath:
            path: /opt/market-bot/bin/market-bot
            type: File
        - name: item-data
          hostPath:
            path: /opt/market-bot/data
            type: DirectoryOrCreate
        - name: cache
          hostPath:
            path: /opt/market-bot/cache
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: market-bot
  namespace: dune-market-bot
spec:
  selector:
    app: market-bot
  ports:
    - name: http-api
      port: 8081
      targetPort: 8081
      protocol: TCP
  type: ClusterIP
